<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Idade</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Verificador de Idade</h1>
</header>

<section>
    <div id="main-content">
        <span class="yob-span">Ano de nascimento:
            <input type="text" id="yob-span-input">
        </span><br>

        <span class="gender">Gênero:
            <input type="radio" name="gender-radio" id="gender-m">
            <label for="masc">Masculino</label>
            <input type="radio" name="gender-radio" id="gender-f">
            <label for="fem">Feminino</label><br>

            <input type="button" value="Verificar" onclick="verificar()">
        </span><br>
    </div>

    <div id="result">
        Preencha os dados acima para ver o resultado!
    </div>
</section>

<footer>
    <p>&copy; Curso em Video</p>
</footer>

<script src="script.js"></script>

</body>

</html>
