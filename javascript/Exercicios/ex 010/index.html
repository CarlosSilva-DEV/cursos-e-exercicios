<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>

<body>
    <h1>Sistema de Multas</h1>
    Velocidade do Carro: <input type="number" name="txtvel" id="vel">
    <input type="button" value="Verificar" onclick="calcular()"><br>
    <div id="result">Resultado</div>

    <script>
        function calcular() {
            var txtvel = window.document.getElementById('vel');
            var res = window.document.getElementById('result');

            var vel = Number(txtvel.value);

            res.innerHTML = `Sua velocidade atual é de <strong>${vel} km/h</strong>.<br>`;
            
            if (vel > 60) {
                res.innerHTML += `<br>Você está <strong>MULTADO</strong> por excesso de velocidade | Limite da Via: 60 km/h<br><br>`;
            }

            res.innerHTML += 'Dirija sempre com cinto de segurança!';
        }



    </script>
</body>

</html>
