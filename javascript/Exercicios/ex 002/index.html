<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: rgb(206, 233, 255);
            font: normal 20pt Arial;
        }
    </style>
    <title>Meu primeiro programa</title>
</head>
<body>
    <h1>Olá, mundo</h1>
    <p>Já me livrei da maldição :D</p>
    <script>
        var nome = window.prompt('Qual é seu nome?'); // Definindo que a var 'nome' recebe o nome escrito pelo usuário no pop-up
        window.alert('Seja bem-vindo, ' + nome); // Exibe uma mensagem de boas vindas concatenada com o dado guardado na var 'nome'
    </script>
</body>
</html>
