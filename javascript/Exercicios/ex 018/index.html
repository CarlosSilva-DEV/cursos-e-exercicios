<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Contador</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Super Contador</h1>
    </header>

    <section>
        <div class="main-content">
            <span id="inicio-span">Inicio
                <input type="number" id="inicio-input">
            </span><br>

            <span id="fim-span">Fim
                <input type="number" id="fim-input">
            </span><br>

            <span id="passo-span">Passo
                <input type="number" id="passo-input">
            </span><br>

            <input type="button" value="Contar" onclick="contar()">
            
            <br><br>

            <div id="result">
                Preparando a contagem...
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; Curso em Video</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
