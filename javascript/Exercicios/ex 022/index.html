<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Números</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>

    <section>
        <div class="main-content">
            <span id="numero-span">Número (entre 1 e 100): 
                <input type="number" id="numero-input">
                <input type="button" value="Adicionar" onclick="adicionarNum()">
            </span>
            
            <br><br>

            <span id="select-span">
                <select name="lista-numeros" id="select-array" size="10"></select><br>
                <input type="button" value="Finalizar" onclick="finalizar()">
            </span>

            <br><br>

            <div id="result">
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; Curso em Video</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
