<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: rgb(206, 233, 255);
            font: normal 20pt Arial;
        }
    </style>
    <title>Meu primeiro programa</title>
</head>
<body>
    <h1>Olá, mundo</h1>
    <p>Já me livrei da maldição :D</p>
    <script>
        window.alert('Minha primeira mensagem'); // Exibir um pop-up com uma mensagem para o usuário
        window.confirm('Está gostando de JavaScript?'); // Exibir um pop-up com uma mensagem e solicitar uma confirmação do usuário
        window.prompt('Qual é seu nome?'); // Exibir um pop-up com mensagem e caixa de entrada de dados do usuário
    </script>
</body>
</html>
