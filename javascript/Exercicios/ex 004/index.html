<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font: normal 20pt Arial;
        }
    </style>
    <title>Formatação de Strings e Números</title>
</head>
<body>
    <script>
        var nome = window.prompt('Qual é o seu nome?')
        document.write(`Olá, ${nome}. Seu nome tem ${nome.length} letras.`)
        document.write(`Seu nome em maiúsculas é ${nome.toUpperCase()}.`)
        document.write(`Seu nome em minúsculas é ${nome.toLowerCase()}.`)
        /*  document.write(): escreve a var na página HTML
            document.writeLn(): escreve a var na página HTML e pula para a linha abaixo
            var.length: exibe a qtde de caracteres no dado
            var.toUpperCase(): exibe a var com todas as letras maiúsculas
            var.toLowerCase(): exibe a var com todas as letras minúsculas */
    </script>
</body>
</html>
