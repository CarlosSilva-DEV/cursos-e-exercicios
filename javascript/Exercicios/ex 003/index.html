<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: rgb(206, 233, 255);
            font: normal 20pt Arial;
        }
    </style>
    <title>Meu primeiro programa</title>
</head>
<body>
    <h1>Olá, mundo</h1>
    <p>Já me livrei da maldição :D</p>
    <script>
        var n1 = Number(window.prompt('Digite um número: '));
        var n2 = Number(window.prompt('Digite outro número: '));
        var s = n1 + n2;
        window.alert(`A soma entre ${n1} e ${n2} é ${s}`)
        
        /* O window.prompt lê os dados como string. 
        Number.parseInt(): converte os dados para número inteiro;
        Number.parseFloat(): converte os dados para número decimal; ou
        Number(): converte os dados para número inteiro ou real (não precisamos especificar).

        number + number: adição
        string + string: concatenação
        
        Podemos, ainda, converter numbers para string.
        String() ou numero.toString(): converte os dados para string. */

        /*
        ('texto com variável') : não faz interpolação
        ('texto' + variável): usando concatenação
        (`texto ${variável}`): usando template string/placeholder
        */
    </script>
</body>
</html>
