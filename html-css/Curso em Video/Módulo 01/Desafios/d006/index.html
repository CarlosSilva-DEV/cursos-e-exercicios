<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos presentes na lista a seguir. Passe omouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul type="square">
        <li><abbr title="Utilize a tag &lt;p&gt;">Parágrafos</abbr>
        </li>
        <li><abbr title="Utilize as tags &lt;h1&gt;, &lt;h2&gt;, &lt;h3&gt; e &lt;h4&gt;">Títulos</abbr>
        </li>
        <li><abbr title="Utilize a tag &lt;img&gt; e defina a origem de sua imagem com o parâmetro 'src'">Imagens</abbr>
        </li>
        <li><abbr title="Utilize a tag &lt;abbr&gt; e defina o texto a ser mostrado com o parâmetro 'title'">Abreviações</abbr>
        </li>
        <li><abbr title="Utilize a tag &lt;code&gt;">Códigos-fonte</abbr>
        </li>
        <li><abbr title="Utilize a tag &lt;ol&gt; e defina cada elemento de sua lista com a tag &lt;li&gt;">Listas numeradas</abbr>
        </li>
        <li><abbr title="Utilize a tag &lt;ul&gt; e defina cada elemento de sua lista com a tag &lt;li&gt;">Listas com demarcadores</abbr>
        </li>
    </ul>
</body>
</html>
